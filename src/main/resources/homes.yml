# home permissions: jossentials.homes.(home number)

# homes feature configuration
homes:
  # maximum number of home slots a player can use
  max-slots: 10
  delete-confirmation:
    # require a second left-click on the action button to delete a home
    enabled: true
    # confirmation window before the delete expires, in seconds
    window-seconds: 5
  # delay after deleting a home before the same slot can be set again, in milliseconds
  delete-to-set-delay-ms: 500
  teleport:
    warmup:
      # enable warmup before teleporting
      enabled: true
      # warmup duration in seconds
      seconds: 3
    # cancel warmup if the player moves
    cancel-on-move: true
    # cancel warmup if the player takes damage
    cancel-on-damage: true
    # how far a player can move before canceling, in blocks
    movement-threshold: 0.1
    # permission to bypass warmup and cancel checks
    bypass-permission: jossentials.homes.teleport.bypass
  gui:
    # gui title shown to players
    title: "Personal Homes - Page %page%"
    # gui title shown when viewing another player's homes
    other-title: "%player%'s Homes - Page %page%"
    # gui size in slots when no page structure is provided
    size: 27
    # click types for gui actions on the home icon
    actions:
      teleport:
        - LEFT
    # show locked slots when the player lacks permission
    show-locked-slots: true
    # ingredient definitions used by structure characters
    ingredients:
      ".":
        material: AIR
        name: ""
        lore: []
        # hide the vanilla tooltip for this item
        hide-tooltip: true
    navigation:
      previous:
        material: ARROW
        name: "<#7f849c>Previous Page"
        lore:
          - "<#d3d3d3>Left-Click to view the previous page."
        hide-tooltip: false
      previous-disabled:
        material: AIR
        # name: "<#7f849c>Previous Page"
        # lore:
        #   - "<#d3d3d3>You are already on the first page."
        # hide-tooltip: false
      next:
        material: ARROW
        name: "<#7f849c>Next Page"
        lore:
          - "<#d3d3d3>Left-Click to view the next page."
        hide-tooltip: false
      next-disabled:
        material: AIR
        # name: "<#7f849c>Next Page"
        # lore:
        #   - "<#d3d3d3>You are already on the last page."
        # hide-tooltip: false
    pages:
      page-1:
        # gui layout, each string is a row of 9 characters
        # P = previous page, N = next page, H = home slot, A = action button slot
        structure:
          - "........."
          - "..HHHHH.."
          - "..AAAAA.."
          - "P.......N"
