qol:
  commands:
    enderchest: true
    back: true
  back:
    # if true, teleports caused by commands, plugins, portals, etc. become /back targets
    track-teleports: true
    # if true, dying stores your death location for /back
    track-death: true
    # if true, the stored location is removed after a successful /back
    clear-after-use: true
    teleport:
      warmup:
        # enable warmup before teleporting back
        enabled: true
        # warmup duration in seconds
        seconds: 3
      # cancel warmup if the player moves
      cancel-on-move: true
      # cancel warmup if the player takes damage
      cancel-on-damage: true
      # how far a player can move before canceling, in blocks
      movement-threshold: 0.1
      # permission to bypass warmup and cancel checks
      bypass-permission: jossentials.back.teleport.bypass
